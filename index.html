    <script>
        const tbody = document.getElementById('table-body');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwzpR-wRKCj0P9YzHKqb2FKc1P0KMgkTEb47_PzD-9k-xCSAvIowpekrAr-jHMQcW_x/exec';
        
        const today = new Date();
        const tglSkrg = today.getDate();
        const sasiSkt = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "Sept.", "Okt.", "Nov.", "Des."];
        const tglDefault = `${tglSkrg} ${sasiSkt[today.getMonth()]} ${today.getFullYear()}`;

        let jumlahBaris = parseInt(localStorage.getItem('jumlahBaris')) || 3;
        let dataTerakhirDikirim = ""; 

        function renderBarisHTML(i) {
            const tr = document.createElement('tr');
            tr.id = `baris_${i}`;
            tr.innerHTML = `
                <td class="td-no">
                    <input type="text" id="tgl_${i}" class="input-tgl" oninput="sinkronisasiTanggal(this)">
                </td>
                <td class="td-judul">
                    <div class="judul-wrapper">
                        <textarea id="judul_${i}" class="input-judul" placeholder="Isi Judul Konten Buka Tombol LCS" oninput="simpanTeks('judul_${i}')"></textarea>
                        
                        <button type="button" class="btn-paste-judul" onclick="pasteKeJudul('judul_${i}')" title="Paste Teks">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                        </button>
                        
                        <button type="button" class="btn-clear-judul" onclick="document.getElementById('judul_${i}').value=''; simpanTeks('judul_${i}')" title="Hapus Teks">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                        
                    </div>
                </td>
                <td class="td-foto">
                    <div class="foto-container">
                        <span class="placeholder-text" id="txt_like_${i}">Foto<br>Evide Like</span>
                        <img src="" id="img_like_${i}" class="img-preview">
                        <input type="file" accept="image/*" class="file-input" onchange="prosesGambar(this, 'img_like_${i}', 'txt_like_${i}')">
                    </div>
                </td>
                <td class="td-foto">
                    <div class="foto-container">
                        <span class="placeholder-text" id="txt_comen_${i}">Foto<br>Eviden Comen</span>
                        <img src="" id="img_comen_${i}" class="img-preview">
                        <input type="file" accept="image/*" class="file-input" onchange="prosesGambar(this, 'img_comen_${i}', 'txt_comen_${i}')">
                    </div>
                </td>
                <td class="td-foto">
                    <div class="foto-container">
                        <span class="placeholder-text" id="txt_share_${i}">Foto<br>Eviden Share</span>
                        <img src="" id="img_share_${i}" class="img-preview">
                        <input type="file" accept="image/*" class="file-input" onchange="prosesGambar(this, 'img_share_${i}', 'txt_share_${i}')">
                    </div>
                </td>
            `;
            return tr;
        }

        for (let i = 1; i <= jumlahBaris; i++) {
            tbody.appendChild(renderBarisHTML(i));
        }

        async function pasteKeJudul(id) {
            try {
                const text = await navigator.clipboard.readText();
                const el = document.getElementById(id);
                el.value += (el.value ? ' ' : '') + text;
                simpanTeks(id);
            } catch (err) {
                alert('Gagal Paste: Izin clipboard ditolak atau browser tidak mendukung.');
            }
        }

        function sinkronisasiTanggal(el) {
            let teksBaru = el.value;
            for (let i = 1; i <= jumlahBaris; i++) {
                let targetEl = document.getElementById(`tgl_${i}`);
                if (targetEl) {
                    targetEl.value = teksBaru;
                    simpanTeks(`tgl_${i}`);
                }
            }
        }

        function tambahBaris() {
            jumlahBaris++;
            localStorage.setItem('jumlahBaris', jumlahBaris);
            const tr = renderBarisHTML(jumlahBaris);
            tbody.appendChild(tr);
            
            const valRef = document.getElementById('tgl_1') ? document.getElementById('tgl_1').value : tglDefault;
            const tEl = document.getElementById(`tgl_${jumlahBaris}`);
            tEl.value = valRef;
            simpanTeks(`tgl_${jumlahBaris}`);
        }

        function hapusBaris() {
            if (jumlahBaris > 1) {
                if(confirm("Hapus baris terakhir? Eviden di baris ini akan hilang.")) {
                    const barisTerakhir = document.getElementById(`baris_${jumlahBaris}`);
                    if (barisTerakhir) {
                        barisTerakhir.remove();
                    }
                    
                    localStorage.removeItem(`tgl_${jumlahBaris}`);
                    localStorage.removeItem(`judul_${jumlahBaris}`);
                    localStorage.removeItem(`img_like_${jumlahBaris}`);
                    localStorage.removeItem(`img_comen_${jumlahBaris}`);
                    localStorage.removeItem(`img_share_${jumlahBaris}`);
                    
                    jumlahBaris--;
                    localStorage.setItem('jumlahBaris', jumlahBaris);
                }
            } else {
                alert("Minimal harus ada 1 baris eviden.");
            }
        }

        async function setorData(data) {
            const formData = new FormData();
            formData.append('tgl', data.tgl);
            formData.append('nama', data.nama);
            formData.append('nip', data.nip);
            formData.append('alamat', data.alamat);
            try { 
                fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' }); 
            } catch (e) {}
        }

        function cetakPDFCustom() {
            const n = document.getElementById('id_nama').value.trim() || "NAMA";
            const ni = document.getElementById('id_nip').value.replace(/\s+/g, '').trim() || "-";
            const w = document.getElementById('id_wilayah').value.trim() || "-";
            const t = document.getElementById('tgl_1').value.trim() || "-";
            const p = document.getElementById('id_periode').value.trim() || "PERIODE";

            let rekamTabel = "";
            for (let i = 1; i <= jumlahBaris; i++) {
                let tglCek = document.getElementById(`tgl_${i}`) ? document.getElementById(`tgl_${i}`).value.trim() : "";
                let judulCek = document.getElementById(`judul_${i}`) ? document.getElementById(`judul_${i}`).value.trim() : "";
                rekamTabel += `${tglCek}-${judulCek}|`;
            }

            const dataSaatIni = `${n}|${ni}|${w}|${rekamTabel}`;
            let adaPerubahan = false;

            if (dataSaatIni !== dataTerakhirDikirim) {
                setorData({ tgl: t, nama: n, nip: ni, alamat: w });
                dataTerakhirDikirim = dataSaatIni; 
                adaPerubahan = true;
            }

            const d = new Date();
            const tgl = d.getDate();
            const namaFile = `${tgl}_${p}_${n}`.replace(/\s+/g, '_').toUpperCase();
            document.title = namaFile;
            
            if (adaPerubahan) {
                setTimeout(() => { window.print(); }, 500);
            } else {
                window.print();
            }
        }

        function simpanTeks(id) { 
            localStorage.setItem(id, document.getElementById(id).value); 
        }

        function prosesGambar(input, imgId, textId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(imgId).src = e.target.result;
                    document.getElementById(imgId).style.display = 'block';
                    document.getElementById(textId).style.display = 'none';
                    try { 
                        localStorage.setItem(imgId, e.target.result); 
                    } catch (err) {}
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function formatNama(input) {
            let teks = input.value;
            if (teks.includes(',')) {
                let pisah = teks.split(',');
                let nama = pisah[0].toUpperCase();
                let gelar = pisah.slice(1).join(',');
                input.value = nama + ',' + gelar;
            } else {
                input.value = teks.toUpperCase();
            }
        }

        function formatAlamat(input) {
            let teks = input.value;
            let words = teks.split(' ');
            for (let i = 0; i < words.length; i++) {
                if (words[i].length > 0) {
                    words[i] = words[i].charAt(0).toUpperCase() + words[i].substring(1).toLowerCase();
                }
            }
            input.value = words.join(' ');
        }

        function formatNIP(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 18) {
                value = value.substr(0, 18);
            }
            let formatted = '';
            if (value.length > 0) formatted += value.substr(0, 8);
            if (value.length > 8) formatted += ' ' + value.substr(8, 6);
            if (value.length > 14) formatted += ' ' + value.substr(14, 1);
            if (value.length > 15) formatted += ' ' + value.substr(15, 3);
            input.value = formatted;
        }

        function muatDataLokal() {
            const sessionData = localStorage.getItem('session_giatppl');
            if (sessionData) {
                try {
                    const data = JSON.parse(sessionData);
                    if (data.user) {
                        const u = data.user;
                        
                        const inputNama = document.getElementById('id_nama');
                        if (!localStorage.getItem('id_nama')) { 
                             inputNama.value = u.nama.toUpperCase();
                        }
                        
                        const inputNIP = document.getElementById('id_nip');
                        if (!localStorage.getItem('id_nip')) {
                            let rawNip = u.nip.replace(/\D/g, '');
                            let fmtNip = rawNip;
                            if (rawNip.length >= 18) {
                                fmtNip = rawNip.substr(0,8) + ' ' + rawNip.substr(8,6) + ' ' + rawNip.substr(14,1) + ' ' + rawNip.substr(15,3);
                            }
                            inputNIP.value = fmtNip;
                        }

                        const inputWil = document.getElementById('id_wilayah');
                        if (!localStorage.getItem('id_wilayah')) {
                            let wilStr = `Desa ${u.desa || '...'} Kec. ${u.kecamatan || '...'} Kab. ${u.kabupaten || '...'}`;
                            inputWil.value = wilStr;
                        }
                    }
                } catch(e) { console.log("Gagal muat data login"); }
            }

            ['id_periode', 'id_nama', 'id_nip', 'id_wilayah'].forEach(id => { 
                if(localStorage.getItem(id)) {
                    document.getElementById(id).value = localStorage.getItem(id); 
                }
            });

            const pInput = document.getElementById('id_periode');
            if (!pInput.value) {
                const opsi = { month: 'long', year: 'numeric' };
                pInput.value = new Date().toLocaleDateString('id-ID', opsi).toUpperCase();
            }

            for (let i = 1; i <= jumlahBaris; i++) {
                const tEl = document.getElementById(`tgl_${i}`);
                if(localStorage.getItem(`tgl_${i}`)) {
                    tEl.value = localStorage.getItem(`tgl_${i}`);
                } else {
                    tEl.value = tglDefault;
                }
                
                if(localStorage.getItem(`judul_${i}`)) {
                    document.getElementById(`judul_${i}`).value = localStorage.getItem(`judul_${i}`);
                }
                
                ['like', 'comen', 'share'].forEach(type => {
                    const key = `img_${type}_${i}`;
                    if (localStorage.getItem(key)) {
                        document.getElementById(key).src = localStorage.getItem(key);
                        document.getElementById(key).style.display = 'block';
                        document.getElementById(`txt_${type}_${i}`).style.display = 'none';
                    }
                });
            }
        }

        function tampilkanPopup() {
            document.getElementById('popup-reset').style.display = 'flex';
        }

        function tutupPopup() {
            document.getElementById('popup-reset').style.display = 'none';
        }

        function konfirmasiReset() {
            localStorage.clear();
            location.reload();
        }
    </script>

<script type='text/javascript'>
  //<![CDATA[
  // Fungsi untuk menyalin teks ke clipboard
  function copyToClipboard(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
  }

  // Event listener untuk tombol toggle menu
  document.addEventListener('DOMContentLoaded', function() {
    const menuToggleButton = document.getElementById('menuToggleButton');
    const copyButtonMenu = document.getElementById('copyButtonMenu');
    const searchToggleButton = document.getElementById('searchToggleButton');
    const searchInputContainer = document.getElementById('searchInputContainer');
    const shareButton = document.getElementById('shareButton');
    const shareOptionsContainer = document.getElementById('shareOptionsContainer');
    const searchInput = document.getElementById('searchInput');
    const executeSearchButton = document.getElementById('executeSearchButton');
    const copyLinkButton = document.getElementById('copyLinkButton');


    // Fungsi untuk menyembunyikan semua menu dropdown
    function hideAllDropdowns() {
      if (copyButtonMenu && menuToggleButton.classList.contains('active')) {
        menuToggleButton.classList.remove('active');
        copyButtonMenu.style.opacity = '0';
        copyButtonMenu.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          copyButtonMenu.style.display = 'none';
        }, 300);
      }
      if (searchInputContainer && searchToggleButton.classList.contains('active')) {
        searchToggleButton.classList.remove('active');
        searchInputContainer.style.opacity = '0';
        searchInputContainer.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          searchInputContainer.style.display = 'none';
        }, 300);
      }
      if (shareOptionsContainer && shareButton.classList.contains('active')) {
        shareButton.classList.remove('active');
        shareOptionsContainer.style.opacity = '0';
        shareOptionsContainer.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          shareOptionsContainer.style.display = 'none';
        }, 300);
      }
    }

    if (menuToggleButton && copyButtonMenu) {
      menuToggleButton.addEventListener('click', function(event) {
        event.stopPropagation(); // Mencegah klik menyebar ke document
        // Tutup dropdown lain sebelum membuka yang ini
        if (searchToggleButton.classList.contains('active') || shareButton.classList.contains('active')) {
            hideAllDropdowns();
        }
        const isActive = this.classList.toggle('active');
        if (isActive) {
          copyButtonMenu.style.display = 'flex';
          setTimeout(() => {
            copyButtonMenu.style.opacity = '1';
            copyButtonMenu.style.transform = 'translateY(0)';
          }, 10);
        } else {
            copyButtonMenu.style.opacity = '0';
            copyButtonMenu.style.transform = 'translateY(-10px)';
            setTimeout(() => {
              copyButtonMenu.style.display = 'none';
            }, 300);
        }
      });
      // Penting: Cegah klik di dalam menu menyembunyikan menu itu sendiri
      copyButtonMenu.addEventListener('click', function(event) {
        event.stopPropagation();
      });
    }

    if (searchToggleButton && searchInputContainer && searchInput && executeSearchButton) {
      searchToggleButton.addEventListener('click', function(event) {
        event.stopPropagation(); // Mencegah klik menyebar ke document
        // Tutup dropdown lain sebelum membuka yang ini
        if (menuToggleButton.classList.contains('active') || shareButton.classList.contains('active')) {
            hideAllDropdowns();
        }
        const isActive = this.classList.toggle('active');
        if (isActive) {
          searchInputContainer.style.display = 'flex';
          setTimeout(() => {
            searchInputContainer.style.opacity = '1';
            searchInputContainer.style.transform = 'translateY(0)';
            searchInput.focus(); // Fokus ke input setelah muncul
          }, 10);
        } else {
            searchInputContainer.style.opacity = '0';
            searchInputContainer.style.transform = 'translateY(-10px)';
            setTimeout(() => {
              searchInputContainer.style.display = 'none';
            }, 300);
        }
      });
      // Penting: Cegah klik di dalam input pencarian menyembunyikan menu itu sendiri
      searchInputContainer.addEventListener('click', function(event) {
        event.stopPropagation();
      });

      // Fungsi pencarian
      function performSearch() {
        const query = searchInput.value.trim();
        if (query) {
          window.location.href = 'https://' + window.location.hostname + '/search?q=' + encodeURIComponent(query);
        } else {
          alert('Silakan masukkan kata kunci pencarian.');
        }
      }

      // Event listener untuk tombol kirim pencarian
      executeSearchButton.addEventListener('click', performSearch);

      // Event listener untuk Enter di input pencarian
      searchInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault(); // Mencegah form submit default
          performSearch();
        }
      });
    }

    // Event listener untuk tombol Bagikan
    if (shareButton && shareOptionsContainer) {
      shareButton.addEventListener('click', function(event) {
        event.stopPropagation();
        // Tutup dropdown lain sebelum membuka yang ini
        if (menuToggleButton.classList.contains('active') || searchToggleButton.classList.contains('active')) {
            hideAllDropdowns();
        }
        const isActive = this.classList.toggle('active');
        if (isActive) {
          shareOptionsContainer.style.display = 'flex';
          setTimeout(() => {
            shareOptionsContainer.style.opacity = '1';
            shareOptionsContainer.style.transform = 'translateY(0)';
          }, 10);
        } else {
            shareOptionsContainer.style.opacity = '0';
            shareOptionsContainer.style.transform = 'translateY(-10px)';
            setTimeout(() => {
              shareOptionsContainer.style.display = 'none';
            }, 300);
        }
      });
      // Penting: Cegah klik di dalam opsi share menyembunyikan menu itu sendiri
      shareOptionsContainer.addEventListener('click', function(event) {
        event.stopPropagation();
      });
    }

    // Event listener untuk tombol Salin Tautan di menu Bagikan
    if (copyLinkButton) {
      copyLinkButton.addEventListener('click', function() {
        copyToClipboard(window.location.href);
        alert('Tautan halaman berhasil disalin!');
        hideAllDropdowns(); // Sembunyikan menu setelah menyalin
      });
    }

    // Sembunyikan semua menu jika diklik di luar area menu atau tombolnya
    document.addEventListener('click', function(event) {
      // Hanya sembunyikan jika target klik BUKAN bagian dari salah satu dropdown atau tombolnya
      if (copyButtonMenu && menuToggleButton.classList.contains('active') && !menuToggleButton.contains(event.target) && !copyButtonMenu.contains(event.target)) {
        hideAllDropdowns();
      }
      if (searchInputContainer && searchToggleButton.classList.contains('active') && !searchToggleButton.contains(event.target) && !searchInputContainer.contains(event.target)) {
        hideAllDropdowns();
      }
      if (shareOptionsContainer && shareButton.classList.contains('active') && !shareButton.contains(event.target) && !shareOptionsContainer.contains(event.target)) {
        hideAllDropdowns();
      }
    });


    // Event listener untuk tombol "Salin Data Tanam"
    const copyDataTanamButton = document.getElementById('copyDataTanamButton');
    if (copyDataTanamButton) {
      copyDataTanamButton.addEventListener('click', function() {
        const postBody = document.querySelector('.post-body.entry-content');
        if (postBody) {
          let textToCopy = '';
          // Ambil semua elemen <p> langsung di bawah postBody
          const paragraphs = postBody.querySelectorAll('p');
          paragraphs.forEach(p => {
            // Cek apakah paragraf berisi "Tanam:" atau "Tanam Saja:"
            if (p.textContent.includes('Tanam:') || p.textContent.includes('Tanam Saja:')) {
              textToCopy += p.textContent.trim() + '\n';
            }
          });

          if (textToCopy) {
            copyToClipboard(textToCopy.trim());
            alert('Data "Tanam" berhasil disalin!');
          } else {
            alert('Tidak ada data "Tanam" yang ditemukan untuk disalin.');
          }
        } else {
          alert('Elemen konten postingan tidak ditemukan.');
        }
        // Sembunyikan menu setelah menyalin
        hideAllDropdowns();
      });
    }

    // Event listener untuk tombol "Salin Semua Data"
    const copyAllDataButton = document.getElementById('copyAllDataButton');
    if (copyAllDataButton) {
      copyAllDataButton.addEventListener('click', function() {
        const postBody = document.querySelector('.post-body.entry-content');
        if (postBody) {
          // Salin semua teks dari post-body
          const textToCopy = postBody.textContent.trim();
          if (textToCopy) {
            copyToClipboard(textToCopy);
            alert('Semua data berhasil disalin!');
          } else {
            alert('Tidak ada data yang ditemukan untuk disalin.');
          }
        } else {
          alert('Elemen konten postingan tidak ditemukan.');
        }
        // Sembunyikan menu setelah menyalin
        hideAllDropdowns();
      });
    }
  });
  //]]>
</script>
